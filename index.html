<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>팀 일정 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client"></script>
<style>
  :root {
    --bg:#0f0f13; --surface:#18181f; --surface2:#22222d; --border:#2e2e3e;
    --accent-blue:#4f8ef7; --accent-green:#3ecf8e; --accent-amber:#f59e0b;
    --accent-rose:#f43f5e; --accent-violet:#a78bfa;
    --text-primary:#e8e8f0; --text-secondary:#8888a8; --text-muted:#55556a;
    --radius:10px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;background:var(--bg);color:var(--text-primary);font-family:'Noto Sans KR',sans-serif;font-size:13px;line-height:1.5;overflow-x:hidden;}
  .page{width:100%;padding:14px 14px 28px;display:flex;flex-direction:column;gap:12px;}

  /* LOGIN */
  .full-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;padding:24px;}
  .login-logo{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;color:var(--text-primary);}
  .login-sub{font-size:13px;color:var(--text-muted);margin-top:-12px;}
  .login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px 36px;width:100%;max-width:360px;display:flex;flex-direction:column;gap:16px;}
  .login-title{font-size:15px;font-weight:700;text-align:center;}
  .login-desc{font-size:12px;color:var(--text-muted);text-align:center;line-height:1.7;}
  .google-btn{display:flex;align-items:center;justify-content:center;gap:10px;background:white;color:#3c4043;border:1px solid #dadce0;border-radius:8px;padding:11px 16px;font-size:13px;font-weight:600;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:box-shadow .18s;width:100%;}
  .google-btn:hover{box-shadow:0 2px 8px rgba(0,0,0,.25);}
  .google-btn svg{width:18px;height:18px;flex-shrink:0;}
  .login-note{font-size:11px;color:var(--text-muted);text-align:center;line-height:1.6;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;}

  /* LOADING */
  .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent-blue);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-text{font-size:13px;color:var(--text-muted);font-family:'Space Mono',monospace;}

  /* HEADER */
  .header{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px;}
  .header-left h1{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;letter-spacing:-.3px;}
  .header-left .subtitle{font-size:11px;color:var(--text-muted);font-family:'Space Mono',monospace;margin-top:2px;}
  .header-right{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .btn{display:flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border);color:var(--text-secondary);font-size:11px;font-family:'Noto Sans KR',sans-serif;padding:5px 10px;border-radius:7px;cursor:pointer;transition:all .18s;white-space:nowrap;}
  .btn:hover{border-color:var(--accent-blue);color:var(--accent-blue);}
  .btn.danger:hover{border-color:var(--accent-rose);color:var(--accent-rose);}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .btn svg{width:12px;height:12px;flex-shrink:0;}
  .today-badge{background:var(--accent-blue);color:white;font-size:10px;font-family:'Space Mono',monospace;padding:5px 10px;border-radius:7px;font-weight:700;letter-spacing:.5px;white-space:nowrap;}
  .user-info{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-secondary);}
  .user-avatar{width:24px;height:24px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--accent-blue);overflow:hidden;}
  .user-avatar img{width:100%;height:100%;object-fit:cover;}

  /* MEMBER FILTER */
  .member-filter{display:flex;gap:6px;flex-wrap:wrap;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 12px;align-items:center;}
  .filter-label{font-size:11px;color:var(--text-muted);margin-right:4px;white-space:nowrap;}
  .member-chip{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);font-size:11px;color:var(--text-muted);cursor:pointer;transition:all .18s;user-select:none;}
  .member-chip.active{border-color:currentColor;}
  .member-chip-dot{width:6px;height:6px;border-radius:50%;}

  /* CALENDAR */
  .cal-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
  .cal-card-header{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--border);}
  .cal-title{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;}
  .cal-nav{display:flex;gap:5px;}
  .cal-nav-btn{width:26px;height:26px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text-secondary);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;}
  .cal-nav-btn:hover{border-color:var(--accent-blue);color:var(--accent-blue);}
  .cal-grid{padding:10px 14px 14px;}
  .cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;}
  .cal-weekday{text-align:center;font-size:10px;font-family:'Space Mono',monospace;color:var(--text-muted);padding:3px 0;text-transform:uppercase;letter-spacing:.4px;}
  .cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
  .cal-day{min-height:64px;padding:5px;border-radius:7px;border:1px solid transparent;transition:all .13s;cursor:default;position:relative;}
  .cal-day:hover{background:var(--surface2);border-color:var(--border);}
  .cal-day.other-month .day-num{color:var(--text-muted);}
  .cal-day.today{border-color:var(--accent-blue);background:rgba(79,142,247,.07);}
  .day-num{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--text-secondary);margin-bottom:3px;}
  .cal-day.today .day-num{color:var(--accent-blue);}
  .event-chip{font-size:9px;padding:1px 5px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;cursor:pointer;transition:opacity .13s;display:block;}
  .event-chip:hover{opacity:.75;}
  .legend-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 16px;border-top:1px solid var(--border);flex-wrap:wrap;}
  .legend-items{display:flex;gap:12px;flex-wrap:wrap;}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text-secondary);}
  .legend-dot{width:7px;height:7px;border-radius:50%;}
  .last-sync{font-size:10px;color:var(--text-muted);font-family:'Space Mono',monospace;}

  /* BOTTOM GRID */
  .bottom-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;}
  .card-header{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
  .card-title{font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;}
  .card-title-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .card-count{font-family:'Space Mono',monospace;font-size:10px;color:var(--text-muted);background:var(--surface2);padding:2px 7px;border-radius:20px;border:1px solid var(--border);}
  .card-body{flex:1;overflow-y:auto;}

  /* MEMBER STATUS */
  .member-row{display:flex;align-items:center;gap:9px;padding:8px 14px;transition:background .13s;border-bottom:1px solid var(--border);}
  .member-row:last-child{border-bottom:none;}
  .member-row:hover{background:var(--surface2);}
  .avatar{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;font-family:'Space Mono',monospace;}
  .member-info{flex:1;min-width:0;}
  .member-name{font-size:12px;font-weight:500;}
  .member-status{font-size:10px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .status-pill{font-size:9px;padding:2px 7px;border-radius:20px;font-weight:700;flex-shrink:0;font-family:'Space Mono',monospace;}

  /* UPCOMING */
  .upcoming-item{display:flex;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border);transition:background .13s;cursor:pointer;}
  .upcoming-item:last-child{border-bottom:none;}
  .upcoming-item:hover{background:var(--surface2);}
  .upcoming-date{width:32px;flex-shrink:0;text-align:center;}
  .upcoming-month{font-size:8px;text-transform:uppercase;color:var(--text-muted);font-family:'Space Mono',monospace;letter-spacing:.4px;}
  .upcoming-day{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;line-height:1;color:var(--text-primary);}
  .upcoming-content{flex:1;min-width:0;}
  .upcoming-title{font-size:12px;font-weight:500;}
  .upcoming-meta{font-size:10px;color:var(--text-muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .type-badge{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:700;flex-shrink:0;align-self:flex-start;}

  /* PURCHASE */
  .purchase-item{padding:9px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .13s;}
  .purchase-item:last-child{border-bottom:none;}
  .purchase-item:hover{background:var(--surface2);}
  .purchase-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
  .purchase-name{font-size:12px;font-weight:500;}
  .purchase-deadline{font-size:10px;font-family:'Space Mono',monospace;color:var(--text-muted);}
  .progress-bar{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;margin-bottom:4px;}
  .progress-fill{height:100%;border-radius:2px;transition:width .3s ease;}
  .purchase-meta{display:flex;justify-content:space-between;font-size:9px;color:var(--text-muted);font-family:'Space Mono',monospace;}

  /* EMPTY */
  .empty-state{text-align:center;padding:24px 14px;color:var(--text-muted);font-size:12px;}
  .empty-icon{font-size:20px;margin-bottom:6px;}

  /* TOOLTIP */
  .tooltip{position:fixed;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:8px 12px;font-size:11px;pointer-events:none;z-index:999;max-width:230px;box-shadow:0 8px 24px rgba(0,0,0,.5);display:none;}
  .tooltip.show{display:block;}
  .tooltip-title{font-weight:700;margin-bottom:2px;}
  .tooltip-sub{color:var(--text-secondary);font-size:10px;line-height:1.6;}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .18s;}
  .modal-overlay.open{opacity:1;pointer-events:all;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;width:380px;max-width:92vw;transform:translateY(8px);transition:transform .18s;}
  .modal-overlay.open .modal{transform:translateY(0);}
  .modal-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
  .modal-close{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px;padding:0;}
  .modal-close:hover{color:var(--text-primary);}
  .form-group{margin-bottom:12px;}
  .form-label{font-size:11px;color:var(--text-secondary);margin-bottom:4px;display:block;}
  .form-input,.form-select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:8px 10px;color:var(--text-primary);font-size:12px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .18s;}
  .form-input:focus,.form-select:focus{border-color:var(--accent-blue);}
  .form-select option{background:var(--surface2);}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .btn-primary{width:100%;background:var(--accent-blue);border:none;color:white;padding:9px;border-radius:7px;font-size:12px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;margin-top:4px;transition:opacity .18s;}
  .btn-primary:hover{opacity:.85;}

  /* COLOR UTILITIES */
  .color-0{background:rgba(79,142,247,.15);color:#4f8ef7;}
  .color-1{background:rgba(62,207,142,.15);color:#3ecf8e;}
  .color-2{background:rgba(245,158,11,.15);color:#f59e0b;}
  .color-3{background:rgba(244,63,94,.15);color:#f43f5e;}
  .color-4{background:rgba(167,139,250,.15);color:#a78bfa;}
  .chip-0{background:rgba(79,142,247,.18);color:#4f8ef7;}
  .chip-1{background:rgba(62,207,142,.18);color:#3ecf8e;}
  .chip-2{background:rgba(245,158,11,.18);color:#f59e0b;}
  .chip-3{background:rgba(244,63,94,.18);color:#f43f5e;}
  .chip-4{background:rgba(167,139,250,.18);color:#a78bfa;}
  .kw-leave{background:rgba(62,207,142,.2);color:#3ecf8e;}
  .kw-external{background:rgba(79,142,247,.2);color:#4f8ef7;}
  .kw-purchase{background:rgba(245,158,11,.2);color:#f59e0b;}
  .kw-team{background:rgba(244,63,94,.2);color:#f43f5e;}
  .kw-other{background:rgba(136,136,168,.18);color:#8888a8;}

  @media(max-width:800px){.bottom-grid{grid-template-columns:1fr 1fr;}}
  @media(max-width:560px){.bottom-grid{grid-template-columns:1fr;}.cal-day{min-height:46px;}.event-chip{display:none;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="full-screen" style="display:none">
  <div class="login-logo">TEAM SCHEDULE</div>
  <p class="login-sub">Google Calendar 연동 팀 일정 대시보드</p>
  <div class="login-card">
    <div class="login-title">Google 계정으로 로그인</div>
    <div class="login-desc">구글 캘린더 일정을 불러오려면<br>Google 계정 로그인이 필요합니다.</div>
    <button class="google-btn" id="loginBtn">
      <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Google로 로그인
    </button>
    <div class="login-note">⚠️ 테스트 모드 앱입니다.<br>Google Cloud Console에서 등록된<br>테스트 사용자 계정만 로그인 가능합니다.</div>
  </div>
</div>

<!-- LOADING -->
<div id="loadingScreen" class="full-screen" style="display:none">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">구글 캘린더 불러오는 중...</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page" style="display:none">

  <div class="header">
    <div class="header-left">
      <h1>TEAM SCHEDULE</h1>
      <div class="subtitle" id="currentDateStr">—</div>
    </div>
    <div class="header-right">
      <div class="user-info">
        <div class="user-avatar" id="userAvatar">?</div>
        <span id="userName">—</span>
      </div>
      <button class="btn" id="syncBtn" onclick="syncAll(this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        새로고침
      </button>
      <button class="btn" onclick="openPurchaseModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        공동구매 추가
      </button>
      <button class="btn danger" onclick="signOut()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        로그아웃
      </button>
      <div class="today-badge" id="todayBadge">—</div>
    </div>
  </div>

  <div class="member-filter" id="memberFilter">
    <span class="filter-label">팀원 필터</span>
  </div>

  <div class="cal-card">
    <div class="cal-card-header">
      <div class="cal-title" id="calTitle">—</div>
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
        <button class="cal-nav-btn" onclick="changeMonth(0)">●</button>
        <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
      </div>
    </div>
    <div class="cal-grid">
      <div class="cal-weekdays">
        <div class="cal-weekday" style="color:var(--accent-rose)">SUN</div>
        <div class="cal-weekday">MON</div><div class="cal-weekday">TUE</div>
        <div class="cal-weekday">WED</div><div class="cal-weekday">THU</div>
        <div class="cal-weekday">FRI</div>
        <div class="cal-weekday" style="color:var(--accent-blue)">SAT</div>
      </div>
      <div class="cal-days" id="calDays"></div>
    </div>
    <div class="legend-row">
      <div class="legend-items" id="legendItems"></div>
      <div class="last-sync" id="lastSync">—</div>
    </div>
  </div>

  <div class="bottom-grid">
    <div class="card">
      <div class="card-header">
        <div class="card-title"><span class="card-title-dot" style="background:var(--accent-green)"></span>팀원 현황</div>
        <span class="card-count" id="memberCount">0명</span>
      </div>
      <div class="card-body" id="memberList"></div>
    </div>
    <div class="card">
      <div class="card-header">
        <div class="card-title"><span class="card-title-dot" style="background:var(--accent-blue)"></span>다가오는 일정</div>
        <span class="card-count" id="upcomingCount">0건</span>
      </div>
      <div class="card-body" id="upcomingList"></div>
    </div>
    <div class="card">
      <div class="card-header">
        <div class="card-title"><span class="card-title-dot" style="background:var(--accent-amber)"></span>공동구매</div>
        <span class="card-count" id="purchaseCount">0건</span>
      </div>
      <div class="card-body" id="purchaseList"></div>
    </div>
  </div>
</div>

<!-- TOOLTIP -->
<div class="tooltip" id="tooltip">
  <div class="tooltip-title" id="tipTitle"></div>
  <div class="tooltip-sub" id="tipSub"></div>
</div>

<!-- PURCHASE MODAL -->
<div class="modal-overlay" id="purchaseModal">
  <div class="modal">
    <div class="modal-title">공동구매 추가 <button class="modal-close" onclick="closeModal('purchaseModal')">✕</button></div>
    <div class="form-group"><label class="form-label">상품명</label><input class="form-input" id="pName" placeholder="상품 이름"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">마감일</label><input class="form-input" id="pDeadline" type="date"></div>
      <div class="form-group"><label class="form-label">목표 인원</label><input class="form-input" id="pTarget" type="number" placeholder="10" min="1"></div>
    </div>
    <div class="form-group"><label class="form-label">현재 참여 인원</label><input class="form-input" id="pCurrent" type="number" placeholder="0" min="0"></div>
    <button class="btn-primary" onclick="addPurchase()">저장</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════
//  ★ 설정 — 팀원 추가/변경 시 여기만 수정하세요 ★
// ════════════════════════════════════════════════════
const CLIENT_ID = '178117998017-ll47al5rh21dp7l7o7bj352ldud53j0l.apps.googleusercontent.com';
const SCOPES    = 'https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/userinfo.profile';

// calendarId:
//   - 본인 계정으로 로그인하는 경우: 'primary'
//   - 다른 팀원의 캘린더를 공유받은 경우: 상대방 Gmail 주소
const MEMBERS = [
  { name: '이지훈', calendarId: 'primary',  colorIdx: 0 },
  { name: '한지훈', calendarId: 'primary',  colorIdx: 1 },
  // ── 팀원 추가 시 아래 줄 복사해서 사용 ──
  // { name: '홍길동', calendarId: 'hong@gmail.com', colorIdx: 2 },
  // { name: '김철수', calendarId: 'kim@gmail.com',  colorIdx: 3 },
];

// 일정 제목 키워드 → 자동 분류
const KEYWORDS = {
  leave:    ['연차','반차','휴가','휴일','off','vacation','leave','반반차'],
  external: ['미팅','외근','출장','방문','컨퍼런스','세미나','현장','meeting','conference'],
  purchase: ['공동구매','구매','주문','order'],
  team:     ['팀','회식','MT','워크샵','workshop','단합'],
};
// ════════════════════════════════════════════════════

const MEMBER_COLORS = ['#4f8ef7','#3ecf8e','#f59e0b','#f43f5e','#a78bfa'];
const today = new Date();
let viewYear  = today.getFullYear();
let viewMonth = today.getMonth();
let events    = [];
let purchases = JSON.parse(localStorage.getItem('team_purchases') || '[]');
let activeFilters = new Set(MEMBERS.map((_,i) => i));
let tokenClient, gapiReady = false, gsiReady = false, lastSyncTime = null;

const fmt = (y,m,d) => `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

function classifyEvent(title = '') {
  const t = title.toLowerCase();
  for (const [type, kws] of Object.entries(KEYWORDS))
    if (kws.some(k => t.includes(k))) return type;
  return 'other';
}

function colorVal(idx) { return MEMBER_COLORS[Math.min(idx, 4)]; }
function labelOf(type) { return {leave:'연차',external:'외근',purchase:'구매',team:'팀',other:'기타'}[type]||'기타'; }

// ── SCREEN SWITCH ──
function show(id) {
  ['loginScreen','loadingScreen','dashboard'].forEach(s => {
    const el = document.getElementById(s);
    el.style.display = (s === id) ? (s === 'dashboard' ? 'flex' : 'flex') : 'none';
    if(s === 'dashboard' && s === id) el.style.flexDirection = 'column';
  });
}

// ── GAPI INIT ──
function initGapi() {
  gapi.load('client', async () => {
    await gapi.client.init({
      discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest'],
    });
    gapiReady = true;
    tryAutoLogin();
  });
}

function initGsi() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: async (resp) => {
      if (resp.error) { alert('로그인 실패: ' + resp.error); show('loginScreen'); return; }
      show('loadingScreen');
      await loadAllCalendars();
    },
  });
  gsiReady = true;
  tryAutoLogin();
}

function tryAutoLogin() {
  if (!gapiReady || !gsiReady) return;
  const saved = sessionStorage.getItem('gcal_token');
  if (saved) {
    gapi.client.setToken(JSON.parse(saved));
    show('loadingScreen');
    loadAllCalendars().catch(() => { sessionStorage.removeItem('gcal_token'); show('loginScreen'); });
  } else {
    show('loginScreen');
  }
}

document.getElementById('loginBtn').addEventListener('click', () => {
  tokenClient.requestAccessToken({ prompt: 'consent' });
});

function signOut() {
  const token = gapi.client.getToken();
  if (token) google.accounts.oauth2.revoke(token.access_token, () => {});
  gapi.client.setToken(null);
  sessionStorage.removeItem('gcal_token');
  events = [];
  show('loginScreen');
}

// ── LOAD CALENDARS ──
async function loadAllCalendars() {
  try {
    sessionStorage.setItem('gcal_token', JSON.stringify(gapi.client.getToken()));

    // 사용자 정보
    document.getElementById('loadingText').textContent = '사용자 정보 확인 중...';
    let userInfo = { name: '사용자', picture: null };
    try {
      const r = await gapi.client.request({ path: 'https://www.googleapis.com/oauth2/v3/userinfo' });
      userInfo = r.result;
    } catch(e) {}

    // 불러올 날짜 범위: 현재 달 기준 ±2개월
    const rangeStart = new Date(today.getFullYear(), today.getMonth() - 2, 1).toISOString();
    const rangeEnd   = new Date(today.getFullYear(), today.getMonth() + 3, 1).toISOString();

    events = [];
    for (let i = 0; i < MEMBERS.length; i++) {
      document.getElementById('loadingText').textContent = `${MEMBERS[i].name} 캘린더 불러오는 중... (${i+1}/${MEMBERS.length})`;
      try {
        const resp = await gapi.client.calendar.events.list({
          calendarId:   MEMBERS[i].calendarId,
          timeMin:      rangeStart,
          timeMax:      rangeEnd,
          singleEvents: true,
          orderBy:      'startTime',
          maxResults:   250,
        });
        (resp.result.items || []).forEach(ev => {
          if (ev.status === 'cancelled') return;
          const startRaw = ev.start?.date || ev.start?.dateTime || '';
          const endRaw   = ev.end?.date   || ev.end?.dateTime   || '';
          if (!startRaw) return;
          let start = startRaw.slice(0, 10);
          let end   = endRaw.slice(0, 10);
          // 종일 이벤트는 end가 exclusive → -1일
          if (ev.end?.date) {
            const d = new Date(end); d.setDate(d.getDate() - 1);
            end = fmt(d.getFullYear(), d.getMonth() + 1, d.getDate());
          }
          events.push({
            title:     ev.summary || '(제목 없음)',
            start, end,
            memberIdx: i,
            type:      classifyEvent(ev.summary),
            location:  ev.location || '',
            calEvent:  ev,
          });
        });
      } catch (err) {
        console.warn(`캘린더 로드 실패 (${MEMBERS[i].name}):`, err);
      }
    }

    lastSyncTime = new Date();
    initDashboard(userInfo);
    show('dashboard');

  } catch (err) {
    console.error(err);
    sessionStorage.removeItem('gcal_token');
    show('loginScreen');
    alert('캘린더 불러오기 실패. 다시 로그인해주세요.\n' + (err.message || ''));
  }
}

async function syncAll(btn) {
  btn.disabled = true;
  const orig = btn.innerHTML;
  btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px;animation:spin .8s linear infinite"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg> 동기화 중...`;
  await loadAllCalendars();
  btn.innerHTML = orig;
  btn.disabled = false;
}

// ── INIT DASHBOARD ──
function initDashboard(userInfo) {
  const DAY_KO   = ['일','월','화','수','목','금','토'];
  const MONTH_EN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const d = today;
  document.getElementById('currentDateStr').textContent =
    `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} (${DAY_KO[d.getDay()]})`;
  document.getElementById('todayBadge').textContent =
    `${MONTH_EN[d.getMonth()].toUpperCase()} ${String(d.getDate()).padStart(2,'0')}`;

  // 사용자 프로필
  document.getElementById('userName').textContent = userInfo.name || '사용자';
  const av = document.getElementById('userAvatar');
  if (userInfo.picture) av.innerHTML = `<img src="${userInfo.picture}" alt="">`;
  else av.textContent = (userInfo.name || '?')[0];

  buildMemberFilter();
  buildLegend();
  renderAll();
}

function buildMemberFilter() {
  const container = document.getElementById('memberFilter');
  container.innerHTML = '<span class="filter-label">팀원 필터</span>';
  MEMBERS.forEach((mb, i) => {
    const chip = document.createElement('div');
    chip.className = 'member-chip active';
    chip.style.color = colorVal(i);
    chip.innerHTML = `<span class="member-chip-dot" style="background:${colorVal(i)}"></span>${mb.name}`;
    chip.addEventListener('click', () => {
      if (activeFilters.has(i)) activeFilters.delete(i);
      else activeFilters.add(i);
      chip.classList.toggle('active', activeFilters.has(i));
      chip.style.opacity = activeFilters.has(i) ? '1' : '0.4';
      renderAll();
    });
    container.appendChild(chip);
  });
}

function buildLegend() {
  const container = document.getElementById('legendItems');
  container.innerHTML = '';
  MEMBERS.forEach((mb, i) => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<span class="legend-dot" style="background:${colorVal(i)}"></span>${mb.name}`;
    container.appendChild(item);
  });
}

// ── RENDER ──
function renderAll() {
  renderCalendar();
  renderMembers();
  renderUpcoming();
  renderPurchases();
  if (lastSyncTime) {
    const h = String(lastSyncTime.getHours()).padStart(2,'0');
    const m = String(lastSyncTime.getMinutes()).padStart(2,'0');
    document.getElementById('lastSync').textContent = `마지막 동기화 ${h}:${m}`;
  }
}

function filteredEvents() { return events.filter(ev => activeFilters.has(ev.memberIdx)); }

function renderCalendar() {
  const MONTHS_KO = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('calTitle').textContent = `${viewYear}년 ${MONTHS_KO[viewMonth]}`;
  const firstDay    = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const daysInPrev  = new Date(viewYear, viewMonth, 0).getDate();
  const todayStr    = fmt(today.getFullYear(), today.getMonth()+1, today.getDate());
  const container   = document.getElementById('calDays');
  container.innerHTML = '';
  let cells = [];
  for(let i=firstDay-1;i>=0;i--)  cells.push({day:daysInPrev-i,month:viewMonth-1,year:viewYear,other:true});
  for(let i=1;i<=daysInMonth;i++) cells.push({day:i,month:viewMonth,year:viewYear,other:false});
  const rem = 42 - cells.length;
  for(let i=1;i<=rem;i++)         cells.push({day:i,month:viewMonth+1,year:viewYear,other:true});

  cells.forEach(c => {
    const dateStr = fmt(c.year, c.month+1, c.day);
    const isToday = dateStr === todayStr;
    const dayEvs  = filteredEvents().filter(ev => ev.start <= dateStr && dateStr <= ev.end);
    const div     = document.createElement('div');
    div.className = 'cal-day'+(c.other?' other-month':'')+(isToday?' today':'');

    const numDiv = document.createElement('div');
    numDiv.className = 'day-num';
    numDiv.textContent = c.day;
    if (!c.other) {
      const dow = new Date(dateStr).getDay();
      if(dow===0) numDiv.style.color = 'var(--accent-rose)';
      if(dow===6) numDiv.style.color = 'var(--accent-blue)';
    }
    div.appendChild(numDiv);

    dayEvs.slice(0, 2).forEach(ev => {
      const chip = document.createElement('div');
      chip.className = `event-chip chip-${Math.min(ev.memberIdx,4)}`;
      chip.textContent = ev.title;
      chip.addEventListener('mouseenter', e => showTooltip(e, ev));
      chip.addEventListener('mouseleave', hideTooltip);
      div.appendChild(chip);
    });
    if(dayEvs.length > 2) {
      const more = document.createElement('div');
      more.style.cssText = 'font-size:8px;color:var(--text-muted);font-family:Space Mono,monospace;padding:1px 2px';
      more.textContent = `+${dayEvs.length-2}`;
      div.appendChild(more);
    }
    container.appendChild(div);
  });
}

function changeMonth(dir) {
  if(dir===0){viewYear=today.getFullYear();viewMonth=today.getMonth();}
  else{viewMonth+=dir;if(viewMonth>11){viewMonth=0;viewYear++;}if(viewMonth<0){viewMonth=11;viewYear--;}}
  renderCalendar(); renderUpcoming();
}

function renderMembers() {
  const container = document.getElementById('memberList');
  document.getElementById('memberCount').textContent = `${MEMBERS.length}명`;
  container.innerHTML = '';
  const todayStr = fmt(today.getFullYear(), today.getMonth()+1, today.getDate());
  MEMBERS.forEach((mb, i) => {
    const todayEvs = events.filter(ev => ev.memberIdx===i && ev.start<=todayStr && todayStr<=ev.end);
    let statusText='재실', statusColor='var(--accent-green)', statusBg='rgba(62,207,142,0.12)';
    if(todayEvs.length > 0) {
      const ev = todayEvs[0];
      if(ev.type==='leave')    {statusText='연차';statusColor='var(--accent-amber)';statusBg='rgba(245,158,11,0.12)';}
      else if(ev.type==='external'){statusText='외근';statusColor='var(--accent-blue)';statusBg='rgba(79,142,247,0.12)';}
      else{statusText=ev.title.slice(0,5);}
    }
    const row = document.createElement('div');
    row.className = 'member-row';
    row.innerHTML = `
      <div class="avatar color-${Math.min(i,4)}">${mb.name.slice(-2)}</div>
      <div class="member-info">
        <div class="member-name">${mb.name}</div>
        <div class="member-status">${todayEvs[0]?.title || '일반 업무 중'}</div>
      </div>
      <div class="status-pill" style="background:${statusBg};color:${statusColor}">${statusText}</div>
    `;
    container.appendChild(row);
  });
}

function renderUpcoming() {
  const container = document.getElementById('upcomingList');
  const todayStr  = fmt(today.getFullYear(), today.getMonth()+1, today.getDate());
  const upcomingEvs = filteredEvents()
    .filter(ev => ev.end >= todayStr)
    .sort((a,b) => a.start.localeCompare(b.start))
    .slice(0, 10);
  document.getElementById('upcomingCount').textContent = `${upcomingEvs.length}건`;
  container.innerHTML = '';
  if(!upcomingEvs.length){
    container.innerHTML='<div class="empty-state"><div class="empty-icon">📅</div>다가오는 일정이 없습니다</div>';return;
  }
  const MO = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  upcomingEvs.forEach(ev => {
    const d    = new Date(ev.start);
    const col  = colorVal(ev.memberIdx);
    const item = document.createElement('div');
    item.className = 'upcoming-item';
    item.innerHTML = `
      <div class="upcoming-date">
        <div class="upcoming-month">${MO[d.getMonth()]}</div>
        <div class="upcoming-day">${String(d.getDate()).padStart(2,'0')}</div>
      </div>
      <div class="upcoming-content">
        <div class="upcoming-title">${ev.title}</div>
        <div class="upcoming-meta">${MEMBERS[ev.memberIdx].name} · ${ev.start===ev.end?ev.start:ev.start+' ~ '+ev.end}</div>
      </div>
      <div class="type-badge kw-${ev.type}">${labelOf(ev.type)}</div>
    `;
    item.addEventListener('mouseenter', e => showTooltip(e, ev));
    item.addEventListener('mouseleave', hideTooltip);
    container.appendChild(item);
  });
}

function renderPurchases() {
  const container = document.getElementById('purchaseList');
  document.getElementById('purchaseCount').textContent = `${purchases.length}건`;
  container.innerHTML = '';
  if(!purchases.length){
    container.innerHTML='<div class="empty-state"><div class="empty-icon">🛒</div>진행 중인 공동구매 없음<br><span style="font-size:10px;display:block;margin-top:4px">상단 버튼으로 추가하세요</span></div>';return;
  }
  purchases.forEach((p, idx) => {
    const pct   = Math.min(100, Math.round(p.current/p.target*100));
    const color = pct>=100?'var(--accent-green)':pct>=60?'var(--accent-blue)':'var(--accent-amber)';
    const item  = document.createElement('div');
    item.className = 'purchase-item';
    item.innerHTML = `
      <div class="purchase-top">
        <div class="purchase-name">${p.name}</div>
        <div style="display:flex;align-items:center;gap:6px">
          <div class="purchase-deadline">${p.deadline}</div>
          <span style="font-size:11px;color:var(--text-muted);cursor:pointer;transition:color .15s" onmouseover="this.style.color='var(--accent-rose)'" onmouseout="this.style.color='var(--text-muted)'" onclick="deletePurchase(${idx})">✕</span>
        </div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>
      <div class="purchase-meta"><span>${p.current}/${p.target}명 참여</span><span style="color:${color};font-weight:700">${pct}%</span></div>
    `;
    container.appendChild(item);
  });
}

// ── TOOLTIP ──
function showTooltip(e, ev) {
  document.getElementById('tipTitle').textContent = ev.title;
  const range = ev.start===ev.end ? ev.start : `${ev.start} ~ ${ev.end}`;
  const loc   = ev.location ? `<br>📍 ${ev.location}` : '';
  document.getElementById('tipSub').innerHTML = `${MEMBERS[ev.memberIdx].name} · ${range} · ${labelOf(ev.type)}${loc}`;
  document.getElementById('tooltip').classList.add('show');
  moveTip(e); document.addEventListener('mousemove', moveTip);
}
function moveTip(e) {
  const t = document.getElementById('tooltip');
  t.style.left = (e.clientX+14)+'px'; t.style.top = (e.clientY+14)+'px';
}
function hideTooltip() {
  document.getElementById('tooltip').classList.remove('show');
  document.removeEventListener('mousemove', moveTip);
}

// ── PURCHASE CRUD ──
function openPurchaseModal() {
  const d = new Date(today); d.setDate(d.getDate()+14);
  document.getElementById('pDeadline').value = fmt(d.getFullYear(),d.getMonth()+1,d.getDate());
  document.getElementById('pCurrent').value  = '0';
  document.getElementById('pName').value     = '';
  document.getElementById('pTarget').value   = '';
  document.getElementById('purchaseModal').classList.add('open');
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(el =>
  el.addEventListener('click', e => { if(e.target===el) el.classList.remove('open'); })
);
function addPurchase() {
  const name = document.getElementById('pName').value.trim();
  if(!name){ alert('상품명을 입력해주세요'); return; }
  purchases.push({
    name,
    deadline: document.getElementById('pDeadline').value,
    target:   parseInt(document.getElementById('pTarget').value)||10,
    current:  parseInt(document.getElementById('pCurrent').value)||0,
  });
  localStorage.setItem('team_purchases', JSON.stringify(purchases));
  closeModal('purchaseModal'); renderPurchases();
}
function deletePurchase(idx) {
  if(!confirm(`"${purchases[idx].name}" 항목을 삭제할까요?`)) return;
  purchases.splice(idx, 1);
  localStorage.setItem('team_purchases', JSON.stringify(purchases));
  renderPurchases();
}

// ── BOOT ──
window.onload = () => { initGapi(); initGsi(); };
</script>
</body>
</html>
